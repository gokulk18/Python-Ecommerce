# We deploy 4 distinct Mongo statefulsets for the microservices
# NOTE: In production, you'd use a real Mongo operator.

# 1. User Mongo
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: user-mongo
  namespace: ecommerce
spec:
  serviceName: "user-mongo"
  replicas: 1
  selector:
    matchLabels:
      app: user-mongo
  template:
    metadata:
      labels:
        app: user-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:7
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: user-mongo-pvc
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: user-mongo-pvc
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: user-mongo
  namespace: ecommerce
spec:
  selector:
    app: user-mongo
  ports:
    - port: 27017

