apiVersion: v1
kind: Service
metadata:
  name: mongodb-products
  namespace: ecommerce
spec:
  ports:
  - port: 27017
    targetPort: 27017
  clusterIP: None
  selector:
    app: mongodb-products
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-products
  namespace: ecommerce
spec:
  serviceName: "mongodb-products"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-products
  template:
    metadata:
      labels:
        app: mongodb-products
    spec:
      containers:
      - name: mongo
        image: mongo:7
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
