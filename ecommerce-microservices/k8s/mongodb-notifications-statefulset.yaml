apiVersion: v1
kind: Service
metadata:
  name: mongodb-notifications
  namespace: ecommerce
spec:
  ports:
  - port: 27017
    targetPort: 27017
  clusterIP: None
  selector:
    app: mongodb-notifications
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-notifications
  namespace: ecommerce
spec:
  serviceName: "mongodb-notifications"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-notifications
  template:
    metadata:
      labels:
        app: mongodb-notifications
    spec:
      containers:
      - name: mongodb
        image: mongo:7
        ports:
        - containerPort: 27017
          name: mongo
        volumeMounts:
        - name: mongodb-notifications-data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodb-notifications-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
