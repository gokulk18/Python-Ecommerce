apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: ecommerce
type: Opaque
data:
  MONGO_URI: bW9uZ29kYjovL21vbmdvZGItdXNlcnM6MjcwMTcvdXNlcnNfZGI= # mongodb://mongodb-users:27017/users_db
  JWT_SECRET: c3VwZXJzZWNyZXRrZXlfcGxlYXNlX2NoYW5nZV9pbl9wcm9k # supersecretkey_please_change_in_prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: user-service:latest
        imagePullPolicy: Never # Adjust or assume pre-loaded in Minikube/Kind
        ports:
        - containerPort: 8001
        envFrom:
        - secretRef:
            name: user-service-secrets
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce
spec:
  selector:
    app: user-service
  ports:
  - port: 8001
    targetPort: 8001
