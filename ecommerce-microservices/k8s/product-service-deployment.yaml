apiVersion: v1
kind: Secret
metadata:
  name: product-service-secrets
  namespace: ecommerce
type: Opaque
data:
  MONGO_URI: bW9uZ29kYjovL21vbmdvZGItcHJvZHVjdHM6MjcwMTcvcHJvZHVjdHNfZGI= # mongodb://mongodb-products:27017/products_db
  JWT_SECRET: c3VwZXJzZWNyZXRrZXlfcGxlYXNlX2NoYW5nZV9pbl9wcm9k # supersecretkey_please_change_in_prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: product-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
        envFrom:
        - secretRef:
            name: product-service-secrets
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: ecommerce
spec:
  selector:
    app: product-service
  ports:
  - port: 8002
    targetPort: 8002
