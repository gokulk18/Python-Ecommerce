apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: user-service:latest # Note: requires pushing to ECR/Dockerhub, or build inside minikube
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: ms-secret
              key: MONGO_URI_USER
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ms-secret
              key: JWT_SECRET
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce
spec:
  selector:
    app: user-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
