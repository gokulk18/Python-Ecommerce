apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-service-config
  namespace: ecommerce
data:
  USER_SERVICE_URL: "http://user-service.ecommerce.svc.cluster.local:8001"
  PRODUCT_SERVICE_URL: "http://product-service.ecommerce.svc.cluster.local:8002"
  ORDER_SERVICE_URL: "http://order-service.ecommerce.svc.cluster.local:8003"
  NOTIFICATION_SERVICE_URL: "http://notification-service.ecommerce.svc.cluster.local:8004"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
      - name: admin-service
        image: nexusstore/admin-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8005
        envFrom:
        - configMapRef:
            name: admin-service-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: admin-service
  ports:
  - port: 8005
    targetPort: 8005
