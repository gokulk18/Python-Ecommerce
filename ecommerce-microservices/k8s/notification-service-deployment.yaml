apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secrets
  namespace: ecommerce
type: Opaque
data:
  MONGO_URI: bW9uZ29kYjovL21vbmdvZGItbm90aWZpY2F0aW9uczoyNzAxNy9ub3RpZmljYXRpb25zX2Ri # mongodb://mongodb-notifications:27017/notifications_db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: notification-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8004
        envFrom:
        - secretRef:
            name: notification-service-secrets
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ecommerce
spec:
  selector:
    app: notification-service
  ports:
  - port: 8004
    targetPort: 8004
