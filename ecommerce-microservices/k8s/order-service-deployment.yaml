apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: ecommerce
data:
  PRODUCT_SERVICE_URL: "http://product-service.ecommerce.svc.cluster.local:8002"
  NOTIFICATION_SERVICE_URL: "http://notification-service.ecommerce.svc.cluster.local:8004"
---
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secrets
  namespace: ecommerce
type: Opaque
data:
  MONGO_URI: bW9uZ29kYjovL21vbmdvZGItb3JkZXJzOjI3MDE3L29yZGVyc19kYg== # mongodb://mongodb-orders:27017/orders_db
  JWT_SECRET: c3VwZXJzZWNyZXRrZXlfcGxlYXNlX2NoYW5nZV9pbl9wcm9k # supersecretkey_please_change_in_prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: order-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8003
        envFrom:
        - configMapRef:
            name: order-service-config
        - secretRef:
            name: order-service-secrets
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce
spec:
  selector:
    app: order-service
  ports:
  - port: 8003
    targetPort: 8003
