version: '3.8'

services:
  # ---------------------
  # DATABASES
  # ---------------------
  user-mongo:
    image: mongo:7
    container_name: user-mongo
    ports:
      - "27017:27017"
    networks:
      - ecommerce-net

  product-mongo:
    image: mongo:7
    container_name: product-mongo
    ports:
      - "27018:27017"
    networks:
      - ecommerce-net

  order-mongo:
    image: mongo:7
    container_name: order-mongo
    ports:
      - "27019:27017"
    networks:
      - ecommerce-net

  notification-mongo:
    image: mongo:7
    container_name: notification-mongo
    ports:
      - "27020:27017"
    networks:
      - ecommerce-net

  # ---------------------
  # MICROSERVICES
  # ---------------------
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8001:8001"
    environment:
      - MONGO_URI=mongodb://user-mongo:27017
      - JWT_SECRET=supersecretjwtkey_123
    depends_on:
      - user-mongo
    networks:
      - ecommerce-net

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8002:8002"
    environment:
      - MONGO_URI=mongodb://product-mongo:27017
    depends_on:
      - product-mongo
    networks:
      - ecommerce-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8003:8003"
    environment:
      - MONGO_URI=mongodb://order-mongo:27017
      - JWT_SECRET=supersecretjwtkey_123
      - PRODUCT_SERVICE_URL=http://product-service:8002
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
    depends_on:
      - order-mongo
      - product-service
      - notification-service
    networks:
      - ecommerce-net

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8004:8004"
    environment:
      - MONGO_URI=mongodb://notification-mongo:27017
    depends_on:
      - notification-mongo
    networks:
      - ecommerce-net

  # ---------------------
  # FRONTEND
  # ---------------------
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge
